name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate spec + frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck yamllint jq
          python3 -m pip install --quiet pyyaml

      - name: Validate spec coverage
        run: ./scripts/validate-spec.sh

      - name: Validate frontmatter YAML
        run: ./scripts/validate-frontmatter.sh

      - name: Verify install scripts are executable
        shell: bash
        run: |
          test -x ciel.skill/init/scripts/install.sh || { echo "install.sh not executable"; exit 1; }
          test -x ciel.skill/init/scripts/verify.sh  || { echo "verify.sh not executable";  exit 1; }
          test -x scripts/build-skill.sh             || { echo "build-skill.sh not executable"; exit 1; }
          test -x scripts/validate-spec.sh           || { echo "validate-spec.sh not executable"; exit 1; }
          test -x scripts/validate-frontmatter.sh    || { echo "validate-frontmatter.sh not executable"; exit 1; }

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get install -y -qq shellcheck
      - name: shellcheck
        run: |
          shellcheck -S warning \
            ciel.skill/init/scripts/install.sh \
            ciel.skill/init/scripts/verify.sh \
            scripts/build-skill.sh \
            scripts/validate-spec.sh \
            scripts/validate-frontmatter.sh

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            ciel.skill/**/*.md
            skills/**/*.md
            agents/**/*.md
            README.md
          config: .markdownlint-cli2.jsonc

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install yamllint
        run: pip install --quiet yamllint
      - name: Run yamllint
        run: |
          yamllint \
            -d '{extends: default, rules: {line-length: disable, comments: {min-spaces-from-content: 1}, truthy: {check-keys: false}, document-start: disable}}' \
            .github/ \
            ciel.skill/

  shfmt:
    name: shfmt
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Install shfmt
        run: |
          curl -fsSL -o /tmp/shfmt https://github.com/mvdan/sh/releases/latest/download/shfmt_v3.13.1_linux_amd64
          chmod +x /tmp/shfmt
          sudo mv /tmp/shfmt /usr/local/bin/shfmt
      - name: shfmt diff check
        run: |
          shfmt -d -i 2 -ci \
            $(find . -name '*.sh' -not -path './dist/*' -not -path './.git/*')

  ruff:
    name: ruff (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install --quiet ruff
      - name: ruff check
        run: ruff check scripts/ ciel.skill/init/scripts/

  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = @()
          $files = Get-ChildItem -Path scripts/*.ps1, ciel.skill/init/scripts/*.ps1 -Recurse
          foreach ($f in $files) {
            $results += Invoke-ScriptAnalyzer -Path $f.FullName -Settings "./.PSScriptAnalyzerSettings.psd1"
          }
          if ($results) {
            $results | Select-Object -Property Message, Path, Line | Format-Table
            if ($results | Where-Object Severity -in 'Error','Warning') { exit 1 }
          } else {
            Write-Host "No PSScriptAnalyzer findings."
          }

  build-test:
    name: Dry-build (0.0.0-ci)
    runs-on: ubuntu-latest
    needs: [validate, shellcheck]
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get install -y -qq zip
      - name: Build a throwaway .skill
        run: |
          # Use a fake version that matches SKILL.md: read declared version from SKILL.md
          v="$(awk -F': *' '/^version:/{print $2; exit}' ciel.skill/SKILL.md | tr -d '[:space:]')"
          ./scripts/build-skill.sh "$v"
      - name: Verify archive structure
        run: |
          set -e
          v="$(awk -F': *' '/^version:/{print $2; exit}' ciel.skill/SKILL.md | tr -d '[:space:]')"
          art="dist/Ciel-v${v}.skill"
          # .skill archives store contents at the zip root (no ciel.skill/ prefix)
          unzip -l "$art" | grep -qE '(^|[[:space:]])SKILL\.md$'
          unzip -l "$art" | grep -q 'init/scripts/install.sh'
          unzip -l "$art" | grep -q 'seed_skills/filesystem/SKILL.md'
          # Check file count roughly matches spec (209 ± small drift)
          count=$(unzip -l "$art" | tail -1 | awk '{print $2}')
          echo "file count in archive: $count"
          if [[ "$count" -lt 240 || "$count" -gt 255 ]]; then
            echo "::error title=File count drift::archive contains $count files; expected ~241"
            exit 1
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: ciel-skill-ci
          path: dist/
          retention-days: 7

  smoke-unpack:
    name: Smoke unpack + verify.sh
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: ciel-skill-ci
          path: dist
      - name: Unpack + structural + verify.sh smoke
        shell: bash
        run: |
          set -e
          mkdir -p /tmp/smoke/unpack && cd /tmp/smoke/unpack
          art=$(ls $GITHUB_WORKSPACE/dist/Ciel-v*.skill | head -1)
          unzip -q "$art"

          # Structure assertions
          test -f SKILL.md
          test -f MANIFEST.md
          test -f CHANGELOG.md
          test -x init/scripts/install.sh
          test -x init/scripts/verify.sh
          test -f init/scripts/install.ps1
          test -d seed_skills
          test -d council
          test -d adapters/claude_code
          test -d adapters/gemini_cli
          test -d adapters/windsurf

          # Syntax check only (no real install, no real cargo)
          bash -n init/scripts/install.sh
          bash -n init/scripts/verify.sh

          # verify.sh against a simulated CIEL_HOME (stub runtime dirs)
          export CIEL_HOME="$(mktemp -d)/.ciel"
          mkdir -p "$CIEL_HOME"/{skills,registry,council,acquisition,checkpoints,improvements,high_risk,archive,.attic,sandbox,backups,integrity,runtimes}
          echo '{"schema":1,"version":"1.0.0","files":{}}' > "$CIEL_HOME/INTEGRITY.json"
          touch "$CIEL_HOME/activity.log"
          mkdir -p "$CIEL_HOME/fs_backend"
          git init "$CIEL_HOME" >/dev/null
          bash init/scripts/verify.sh
          echo "smoke OK"
